name: Lint

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Style check
        run: brew style Casks/dsfm.rb

      - name: Audit cask (offline)
        run: |
          brew tap brc-xyz/dsfm .
          brew audit --cask brc-xyz/dsfm/dsfm
