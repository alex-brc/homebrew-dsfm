name: Lint

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Style check
        run: brew style Casks/dsfm.rb

      - name: Audit cask (offline)
        run: |
          brew tap alex-brc/dsfm .
          brew audit --cask alex-brc/dsfm/dsfm
